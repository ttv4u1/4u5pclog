<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPRD v2.5.2 - Sistem Pengurusan Rekod Digital</title>
    <!-- Library Diperlukan -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a; 
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('https://images.alphacoders.com/132/1326442.png'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        [x-cloak] { display: none !important; }
        .loading-screen {
            position: fixed; inset: 0; background: #0f172a; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800" x-data="appData()">

    <!-- LOADING OVERLAY (Hanya muncul semasa check session) -->
    <div x-show="initializing" class="loading-screen">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-4"></div>
        <p class="text-sm font-bold tracking-widest uppercase">Menyemak Akses...</p>
    </div>

    <!-- HEADER -->
    <header class="glass-panel m-4 p-4 rounded-2xl flex flex-wrap justify-between items-center border-b-4 border-blue-600">
        <div class="flex items-center gap-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Coat_of_arms_of_Malaysia.svg/1200px-Coat_of_arms_of_Malaysia.svg.png" alt="Jata" class="h-12">
            <div class="ml-2 border-l-2 border-gray-300 pl-4">
                <h1 class="text-lg font-extrabold text-blue-900 leading-tight">SPRD DIGITAL</h1>
                <p class="text-[10px] font-bold text-blue-600 uppercase">Versi Korporat 2.5.2</p>
            </div>
        </div>
        <div class="text-right bg-blue-900 text-white p-3 rounded-xl min-w-[140px]">
            <div class="text-xl font-mono font-bold" x-text="realtimeClock"></div>
            <div class="text-[9px] uppercase opacity-70" x-text="realtimeDay"></div>
        </div>
    </header>

    <!-- PAPARAN LOGIN -->
    <div x-show="!isLoggedIn && !initializing" class="mt-20 flex justify-center px-4" x-cloak>
        <div class="glass-panel p-10 rounded-3xl text-center max-w-sm w-full">
            <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="shield-check" class="text-blue-600 w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">Selamat Datang</h2>
            <p class="text-gray-500 text-sm mb-8">Sila log masuk untuk akses rekod kehadiran & perjalanan.</p>
            <button @click="loginGoogle" class="w-full bg-white border-2 border-gray-100 hover:border-blue-400 p-4 rounded-2xl flex items-center justify-center gap-4 font-bold transition-all shadow-sm">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Log Masuk Google
            </button>
        </div>
    </div>

    <!-- DASHBOARD UTAMA -->
    <main class="p-4 max-w-6xl mx-auto" x-show="isLoggedIn" x-cloak>
        <nav class="flex gap-2 mb-6">
            <button @click="tab = 'kad'" :class="tab === 'kad' ? 'bg-blue-600 text-white' : 'bg-white'" class="px-6 py-2 rounded-xl font-bold shadow-md">Kehadiran</button>
            <button @click="tab = 'log'" :class="tab === 'log' ? 'bg-emerald-600 text-white' : 'bg-white'" class="px-6 py-2 rounded-xl font-bold shadow-md">Log Perjalanan</button>
        </nav>

        <div x-show="tab === 'kad'" class="glass-panel p-6 rounded-3xl animate-in fade-in">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-blue-900">Rekod Kad Perakam Waktu</h2>
                <button @click="punchAction" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:scale-105 transition-transform">
                    PUNCH MASA SEKARANG
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[11px] uppercase font-bold">
                        <tr>
                            <th class="p-4">Tarikh</th>
                            <th class="p-4">Masa Masuk</th>
                            <th class="p-4">Masa Keluar</th>
                            <th class="p-4">Status</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <template x-for="item in dataKad" :key="item.id">
                            <tr class="hover:bg-blue-50/50">
                                <td class="p-4 text-sm" x-text="item.tarikh"></td>
                                <td class="p-4 font-mono font-bold text-blue-700" x-text="item.masa_masuk"></td>
                                <td class="p-4 font-mono" x-text="item.masa_keluar || '--:--'"></td>
                                <td class="p-4">
                                    <span :class="item.status === 'Lewat' ? 'text-red-500' : 'text-green-600'" class="font-bold text-xs" x-text="item.status"></span>
                                </td>
                            </tr>
                        </template>
                        <tr x-show="dataKad.length === 0">
                            <td colspan="4" class="p-10 text-center text-gray-400 italic">Tiada rekod data dijumpai.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- USER INFO FOOTER -->
    <footer x-show="isLoggedIn" x-cloak class="fixed bottom-6 right-6">
        <div class="glass-panel p-2 px-5 rounded-full flex items-center gap-4 border-2 border-blue-400">
            <div class="text-right">
                <p class="text-[10px] font-black text-blue-900 uppercase" x-text="userName"></p>
                <button @click="logout" class="text-[9px] text-red-500 font-bold hover:underline">LOG KELUAR</button>
            </div>
            <img :src="userAvatar" class="w-10 h-10 rounded-full border-2 border-white shadow-md">
        </div>
    </footer>

    <script>
        const SUPABASE_URL = 'https://zkomhgzlcfjzhijhptec.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inprb21oZ3psY2ZqemhpamhwdGVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTk3MTQsImV4cCI6MjA5MzAzNTcxNH0.p51eTeql9tiHXYIaGuxh0DuDET9F_R7F5j2eG-99QBk';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function appData() {
            return {
                tab: 'kad',
                isLoggedIn: false,
                initializing: true,
                userName: '',
                userAvatar: '',
                userId: '',
                realtimeClock: '',
                realtimeDay: '',
                dataKad: [],

                async init() {
                    this.updateTime();
                    setInterval(() => this.updateTime(), 1000);
                    
                    // Force refresh session dari URL hash (Penting untuk Google Redirect)
                    const { data: { session } } = await sb.auth.getSession();
                    
                    if (session) {
                        this.setupUser(session.user);
                    } else {
                        // Tunggu sekejap jika redirect sedang diproses
                        setTimeout(async () => {
                            const { data: { session: delayedSession } } = await sb.auth.getSession();
                            if (delayedSession) this.setupUser(delayedSession.user);
                            this.initializing = false;
                        }, 800);
                    }

                    sb.auth.onAuthStateChange((evt, session) => {
                        if (session) this.setupUser(session.user);
                        else { this.isLoggedIn = false; this.initializing = false; }
                    });

                    lucide.createIcons();
                },

                setupUser(user) {
                    this.isLoggedIn = true;
                    this.initializing = false;
                    this.userId = user.id;
                    this.userName = user.user_metadata.full_name;
                    this.userAvatar = user.user_metadata.avatar_url;
                    this.fetchKadMasa();
                    setTimeout(() => lucide.createIcons(), 200);
                },

                updateTime() {
                    const now = new Date();
                    this.realtimeClock = now.toLocaleTimeString('ms-MY', { hour12: true });
                    this.realtimeDay = now.toLocaleDateString('ms-MY', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                },

                async fetchKadMasa() {
                    const { data } = await sb.from('kad_masa').select('*').eq('user_id', this.userId).order('tarikh', {ascending: false});
                    if(data) this.dataKad = data;
                },

                async punchAction() {
                    const now = new Date();
                    const t = now.toISOString().split('T')[0];
                    const m = now.toLocaleTimeString('ms-MY', {hour12:false, hour:'2-digit', minute:'2-digit'});
                    
                    await sb.from('kad_masa').insert([{
                        user_id: this.userId,
                        tarikh: t,
                        masa_masuk: m,
                        status: now.getHours() >= 9 ? 'Lewat' : 'Tepat Waktu'
                    }]);
                    this.fetchKadMasa();
                },

                async loginGoogle() {
                    this.initializing = true;
                    await sb.auth.signInWithOAuth({ 
                        provider: 'google',
                        options: { redirectTo: window.location.origin + window.location.pathname }
                    });
                },

                async logout() {
                    await sb.auth.signOut();
                    location.reload();
                }
            }
        }
    </script>
</body>
</html>
