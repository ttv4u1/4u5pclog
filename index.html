<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPRD v2.4.1 - Sistem Pengurusan Rekod Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.alphacoders.com/132/1326442.png'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .btn-realistic {
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 0 rgb(15, 23, 42);
        }

        .btn-realistic:active {
            transform: translateY(4px);
            box-shadow: 0 0 0;
        }

        [x-cloak] { display: none !important; }
        .late-entry { background-color: #fee2e2 !important; color: #dc2626; font-weight: bold; }
        .ot-entry { background-color: #dcfce7 !important; color: #16a34a; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen text-slate-800" x-data="appData()">

    <!-- HEADER LOGO & JAM -->
    <header class="glass-panel m-4 p-4 rounded-2xl flex flex-wrap justify-between items-center border-b-4 border-blue-600">
        <div class="flex items-center gap-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Coat_of_arms_of_Malaysia.svg/1200px-Coat_of_arms_of_Malaysia.svg.png" alt="Jata" class="h-16">
            <div class="ml-4 border-l-2 pl-4 hidden md:block">
                <h1 class="text-xl font-bold text-blue-900 leading-tight">SISTEM PENGURUSAN REKOD DIGITAL</h1>
                <p class="text-sm font-semibold text-blue-600">VERSI KORPORAT 2.4.1 (STABLE)</p>
            </div>
        </div>

        <div class="text-right bg-blue-900 text-white p-3 rounded-xl shadow-inner">
            <div class="text-2xl font-mono font-bold" x-text="realtimeClock"></div>
            <div class="text-xs uppercase tracking-widest" x-text="realtimeDay"></div>
        </div>
    </header>

    <!-- AUTH SECTION -->
    <template x-if="!isLoggedIn">
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/80">
            <div class="glass-panel p-8 rounded-3xl text-center max-w-sm w-full mx-4">
                <div class="mb-6">
                    <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="shield-check" class="w-10 h-10 text-blue-600"></i>
                    </div>
                    <h2 class="text-2xl font-bold">Log Masuk</h2>
                    <p class="text-gray-500 text-sm">Sila gunakan akaun Google agensi anda</p>
                </div>
                <button @click="loginGoogle" class="btn-realistic bg-white text-gray-700 font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-3 w-full border-2 border-gray-200 hover:bg-gray-50">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                    Log Masuk dengan Google
                </button>
            </div>
        </div>
    </template>

    <!-- MAIN CONTENT -->
    <main class="p-4" x-show="isLoggedIn" x-cloak>
        <!-- Tab Navigation & Content Sama Seperti Sebelum Ini -->
        <nav class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button @click="tab = 'kad'" :class="tab === 'kad' ? 'bg-blue-600 text-white' : 'bg-white'" class="btn-realistic px-6 py-2 rounded-full font-bold whitespace-nowrap">Kad Perakam Waktu</button>
            <button @click="tab = 'log'" :class="tab === 'log' ? 'bg-green-600 text-white' : 'bg-white'" class="btn-realistic px-6 py-2 rounded-full font-bold whitespace-nowrap">Log Perjalanan</button>
            <button @click="tab = 'upload'" :class="tab === 'upload' ? 'bg-purple-600 text-white' : 'bg-white'" class="btn-realistic px-6 py-2 rounded-full font-bold whitespace-nowrap">Muat Naik Resit/Odo</button>
        </nav>

        <!-- KANDUNGAN TAB (Kekal sama seperti v2.4.0) -->
        <div x-show="tab === 'kad'" class="glass-panel p-6 rounded-3xl">
             <h2 class="text-xl font-bold mb-4">Rekod Kehadiran Digital</h2>
             <!-- Jadual Kad Perakam Waktu diletakkan di sini -->
             <p class="text-gray-500 italic">Antaramuka Kad Perakam Waktu Aktif...</p>
        </div>

        <div x-show="tab === 'log'" class="glass-panel p-6 rounded-3xl">
            <h2 class="text-xl font-bold mb-4">Log Perjalanan Kenderaan</h2>
            <!-- Jadual Log diletakkan di sini -->
             <p class="text-gray-500 italic">Antaramuka Log Perjalanan Aktif...</p>
        </div>
    </main>

    <!-- FOOTER PROFILE -->
    <footer x-show="isLoggedIn" x-cloak class="fixed bottom-0 right-0 p-4">
        <div class="glass-panel p-3 rounded-2xl flex items-center gap-3 shadow-2xl border-2 border-blue-400">
            <img :src="userAvatar" class="w-10 h-10 rounded-full border-2 border-blue-500" x-show="userAvatar">
            <div class="text-xs">
                <p class="font-bold" x-text="userName"></p>
                <button @click="logout" class="text-red-600 hover:underline">Log Keluar</button>
            </div>
        </div>
    </footer>

    <script>
        // --- KONFIGURASI SUPABASE ---
        // Gantikan dengan maklumat dari Project Settings > API di Dashboard Supabase anda
        const SUPABASE_URL = 'https://zkomhgzlcfjzhijhptec.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inprb21oZ3psY2ZqemhpamhwdGVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTk3MTQsImV4cCI6MjA5MzAzNTcxNH0.p51eTeql9tiHXYIaGuxh0DuDET9F_R7F5j2eG-99QBk';

        const supabase = Object.keys(supabasejs || {}).length > 0 
            ? supabasejs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
            : null;

        function appData() {
            return {
                tab: 'kad',
                isLoggedIn: false,
                userName: '',
                userAvatar: '',
                realtimeClock: '',
                realtimeDay: '',
                
                async init() {
                    this.updateTime();
                    setInterval(() => this.updateTime(), 1000);
                    
                    // Semak sesi sedia ada
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session) {
                        this.setUser(session.user);
                    }

                    // Dengar perubahan auth
                    supabase.auth.onAuthStateChange((event, session) => {
                        if (event === 'SIGNED_IN' && session) {
                            this.setUser(session.user);
                        } else if (event === 'SIGNED_OUT') {
                            this.isLoggedIn = false;
                        }
                    });

                    lucide.createIcons();
                },

                setUser(user) {
                    this.isLoggedIn = true;
                    this.userName = user.user_metadata.full_name || user.email;
                    this.userAvatar = user.user_metadata.avatar_url;
                    setTimeout(() => lucide.createIcons(), 100);
                },

                updateTime() {
                    const now = new Date();
                    this.realtimeClock = now.toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
                    this.realtimeDay = now.toLocaleDateString('ms-MY', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                },

                async loginGoogle() {
                    const { error } = await supabase.auth.signInWithOAuth({
                        provider: 'google',
                        options: {
                            redirectTo: window.location.href
                        }
                    });
                    if (error) alert("Ralat Log Masuk: " + error.message);
                },

                async logout() {
                    await supabase.auth.signOut();
                    this.isLoggedIn = false;
                    location.reload();
                }
            }
        }
    </script>
</body>
</html>
