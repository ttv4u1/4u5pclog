<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPRD v2.5.1 - Sistem Pengurusan Rekod Digital</title>
    <!-- Library Diperlukan -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background: #1e293b; /* Fallback color */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.alphacoders.com/132/1326442.png'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .btn-realistic {
            transition: all 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
        }
        .btn-realistic:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.1);
        }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="min-h-screen text-slate-800" x-data="appData()">

    <!-- HEADER: Sentiasa dipaparkan -->
    <header class="glass-panel m-4 p-4 rounded-2xl flex flex-wrap justify-between items-center border-b-4 border-blue-600">
        <div class="flex items-center gap-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Coat_of_arms_of_Malaysia.svg/1200px-Coat_of_arms_of_Malaysia.svg.png" alt="Jata" class="h-14">
            <div class="ml-4 border-l-2 border-gray-300 pl-4 hidden md:block">
                <h1 class="text-lg font-bold text-blue-900 leading-tight uppercase">Sistem Pengurusan Rekod Digital</h1>
                <p class="text-xs font-semibold text-blue-600">VERSI KORPORAT 2.5.1 (STABLE)</p>
            </div>
        </div>

        <div class="text-right bg-blue-900 text-white p-3 rounded-xl shadow-inner min-w-[160px]">
            <div class="text-2xl font-mono font-bold" x-text="realtimeClock || '00:00:00'"></div>
            <div class="text-[10px] uppercase tracking-widest opacity-80" x-text="realtimeDay || 'Memuatkan...'"></div>
        </div>
    </header>

    <!-- PAPARAN LOG MASUK: Muncul jika isLoggedIn = false -->
    <div x-show="!isLoggedIn" class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm" x-cloak>
        <div class="glass-panel p-10 rounded-3xl text-center max-w-sm w-full mx-4">
            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="lock" class="text-blue-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Akses Terhad</h2>
            <p class="text-gray-500 text-sm mb-8">Sila log masuk dengan akaun agensi anda untuk teruskan.</p>
            
            <button @click="loginGoogle" class="btn-realistic bg-white text-gray-700 font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-4 w-full border border-gray-200 hover:bg-gray-50">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Log Masuk Google
            </button>
        </div>
    </div>

    <!-- PAPARAN UTAMA: Muncul selepas login -->
    <main class="p-4 max-w-6xl mx-auto" x-show="isLoggedIn" x-cloak>
        
        <!-- NAVIGATION -->
        <nav class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button @click="tab = 'kad'; fetchKadMasa()" :class="tab === 'kad' ? 'bg-blue-600 text-white' : 'bg-white'" class="btn-realistic px-6 py-2 rounded-xl font-bold">Kehadiran</button>
            <button @click="tab = 'log'; fetchLogPerjalanan()" :class="tab === 'log' ? 'bg-emerald-600 text-white' : 'bg-white'" class="btn-realistic px-6 py-2 rounded-xl font-bold">Log Perjalanan</button>
            <button @click="tab = 'profil'" :class="tab === 'profil' ? 'bg-purple-600 text-white' : 'bg-white'" class="btn-realistic px-6 py-2 rounded-xl font-bold">Profil</button>
        </nav>

        <!-- KANDUNGAN TAB KAD MASA -->
        <div x-show="tab === 'kad'" class="glass-panel p-6 rounded-3xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-blue-900">Rekod Kehadiran</h2>
                <button @click="punchAction" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold btn-realistic">Daftar Masa</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-blue-50 text-[10px] uppercase font-bold text-blue-600">
                        <tr>
                            <th class="p-3">Tarikh</th>
                            <th class="p-3">Masuk</th>
                            <th class="p-3">Keluar</th>
                            <th class="p-3">Status</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y">
                        <template x-for="item in dataKad" :key="item.id">
                            <tr>
                                <td class="p-3 text-sm" x-text="item.tarikh"></td>
                                <td class="p-3 font-mono font-bold" x-text="item.masa_masuk"></td>
                                <td class="p-3 font-mono" x-text="item.masa_keluar || '--:--'"></td>
                                <td class="p-3">
                                    <span :class="item.status === 'Lewat' ? 'text-red-500' : 'text-green-500'" class="text-xs font-bold" x-text="item.status"></span>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- FOOTER PROFILE -->
    <footer x-show="isLoggedIn" x-cloak class="fixed bottom-4 right-4">
        <div class="glass-panel p-2 px-4 rounded-full flex items-center gap-3 border-2 border-blue-400">
            <div class="text-right">
                <p class="text-xs font-bold text-blue-900" x-text="userName"></p>
                <button @click="logout" class="text-[10px] text-red-500 font-bold uppercase">Log Keluar</button>
            </div>
            <img :src="userAvatar" class="w-10 h-10 rounded-full">
        </div>
    </footer>

    <script>
        // CONFIG
        const SUPABASE_URL = 'https://zkomhgzlcfjzhijhptec.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inprb21oZ3psY2ZqemhpamhwdGVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTk3MTQsImV4cCI6MjA5MzAzNTcxNH0.p51eTeql9tiHXYIaGuxh0DuDET9F_R7F5j2eG-99QBk';
        
        // PENTING: Gunakan 'supabase.createClient' bukan 'supabasejs'
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function appData() {
            return {
                tab: 'kad',
                isLoggedIn: false,
                userName: '',
                userAvatar: '',
                userId: '',
                realtimeClock: '',
                realtimeDay: '',
                dataKad: [],

                async init() {
                    this.updateTime();
                    setInterval(() => this.updateTime(), 1000);
                    
                    const { data: { session } } = await sb.auth.getSession();
                    if (session) this.setupUser(session.user);

                    sb.auth.onAuthStateChange((evt, session) => {
                        if (session) this.setupUser(session.user);
                        else this.isLoggedIn = false;
                    });
                    
                    lucide.createIcons();
                },

                setupUser(user) {
                    this.isLoggedIn = true;
                    this.userId = user.id;
                    this.userName = user.user_metadata.full_name;
                    this.userAvatar = user.user_metadata.avatar_url;
                    this.fetchKadMasa();
                },

                updateTime() {
                    const now = new Date();
                    this.realtimeClock = now.toLocaleTimeString('ms-MY', { hour12: true });
                    this.realtimeDay = now.toLocaleDateString('ms-MY', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                },

                async fetchKadMasa() {
                    const { data } = await sb.from('kad_masa').select('*').eq('user_id', this.userId).order('tarikh', {ascending: false});
                    if(data) this.dataKad = data;
                },

                async punchAction() {
                    const now = new Date();
                    const t = now.toISOString().split('T')[0];
                    const m = now.toLocaleTimeString('ms-MY', {hour12:false, hour:'2-digit', minute:'2-digit'});
                    
                    await sb.from('kad_masa').insert([{
                        user_id: this.userId,
                        tarikh: t,
                        masa_masuk: m,
                        status: now.getHours() >= 9 ? 'Lewat' : 'Tepat Waktu'
                    }]);
                    this.fetchKadMasa();
                },

                async loginGoogle() {
                    await sb.auth.signInWithOAuth({ provider: 'google' });
                },

                async logout() {
                    await sb.auth.signOut();
                    location.reload();
                }
            }
        }
    </script>
</body>
</html>
